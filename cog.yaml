build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  python_packages:
    - "torch==2.4.0"
    - "torchvision==0.19.0"
    - "torchaudio==2.4.0"
    - "huggingface_hub==0.25.2"
    - "transformers==4.45.2"
    - "safetensors==0.4.5"
    - "numpy<2"
    - "pillow==10.4.0"
    - "tqdm"
    - "pyyaml"
    # Required by ComfyUI-GGUF for both UnetLoaderGGUF and CLIPLoaderGGUF.
    # Without it the node logs "WARNING: llama-cpp-python library not found,
    # GGUF functionality is not available" and the workflow fails validation.
    - "llama-cpp-python"
  system_packages:
    - "git"
    - "wget"
    - "ffmpeg"
    - "libsm6"
    - "libxext6"
  run:
    - "curl -fsSL -o /usr/local/bin/pget https://github.com/replicate/pget/releases/download/v0.8.2/pget_linux_x86_64 && chmod +x /usr/local/bin/pget"
    - "git clone --depth 1 --branch v0.3.76 https://github.com/comfyanonymous/ComfyUI.git /opt/comfyui"
    - "pip install -r /opt/comfyui/requirements.txt"
    - "mkdir -p /opt/comfyui/models /opt/comfyui/input /opt/comfyui/output /opt/comfyui/custom_nodes"
    # Custom-node installs — one run: item per node so each is its own cache layer.
    # cog rejects multi-line strings here, hence the &&-chained one-liners.
    # Source of truth for this list is custom_nodes.json — keep in sync.
    # SHAs are HEAD of main as of 2026-04-28. The "ver" fields in the
    # source workflow JSON are ComfyUI Registry versions, not git tags —
    # they don't exist on GitHub. Repin via `git ls-remote <url> HEAD`.
    - "bash -c 'D=/opt/comfyui/custom_nodes/ComfyUI-GGUF && git clone https://github.com/city96/ComfyUI-GGUF $D && git -C $D checkout 6ea2651e7df66d7585f6ffee804b20e92fb38b8a && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    - "bash -c 'D=/opt/comfyui/custom_nodes/was-node-suite-comfyui && git clone https://github.com/ltdrdata/was-node-suite-comfyui $D && git -C $D checkout afeee09ba44e713ec52a413ac6b105fd06b2d356 && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    - "bash -c 'D=/opt/comfyui/custom_nodes/ComfyUI-Easy-Sam3 && git clone https://github.com/yolain/ComfyUI-Easy-Sam3 $D && git -C $D checkout 88fe578a1a5e03d95281197303d5d3a73fd5a089 && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    - "bash -c 'D=/opt/comfyui/custom_nodes/ComfyUI-JoyCaption && git clone https://github.com/1038lab/ComfyUI-JoyCaption $D && git -C $D checkout a0e9f0a17a5deb933fef341e2c7b0131e4f83c8a && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    - "bash -c 'D=/opt/comfyui/custom_nodes/ComfyUI-Inpaint-CropAndStitch && git clone https://github.com/lquesada/ComfyUI-Inpaint-CropAndStitch $D && git -C $D checkout 8e59ab12d6709616528279c85c0648ca8441684d && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    - "bash -c 'D=/opt/comfyui/custom_nodes/rgthree-comfy && git clone https://github.com/rgthree/rgthree-comfy $D && git -C $D checkout 683836c46e898668936c433502504cc0627482c5 && { [ ! -f $D/requirements.txt ] || pip install --no-cache-dir -r $D/requirements.txt; }'"
    # Note: model weights are NOT downloaded at build time. Two reasons:
    #   1. cog COPYs /src into the container *after* run: completes, so we
    #      can't reference scripts/download_weights.py or weights.json here.
    #   2. Civitai-gated entries need CIVITAI_TOKEN, which we pass at runtime
    #      via env (deploy.py forwards it to vast.ai) rather than bake into
    #      the image as a build secret.
    # predict.py setup() invokes scripts/download_weights.py before launching
    # ComfyUI; first health-check request waits for downloads (~3-5min on a
    # fast vast.ai host for ~10GB).

predict: "predict.py:Predictor"
